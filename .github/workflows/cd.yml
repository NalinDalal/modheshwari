name: CD

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'apps/**'
      - 'Dockerfile'
      - '.github/workflows/cd.yml'

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build, push to ECR and deploy to ECS
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Deploy to EC2 via SSH
        env:
          AWS_REGION: ${{ secrets.AWS_REGION }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          CONTAINER_NAME: ${{ secrets.CONTAINER_NAME }}
        run: |
          set -euo pipefail
          echo "Preparing to deploy image: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG to $EC2_USER@$EC2_HOST"

          # write SSH key from secret
          echo "Writing SSH key"
          echo "${{ secrets.EC2_SSH_KEY }}" > ec2_key.pem
          chmod 600 ec2_key.pem

          # Ensure host is in known_hosts (avoid interactive prompt)
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts || true

          # Use AWS CLI to get ECR auth token and pipe it to remote docker login, then pull and restart container
          AWS_PASSWORD=$(aws ecr get-login-password --region "$AWS_REGION")

          REMOTE_CMD="set -euo pipefail
          echo 'Logging into ECR on remote'
          echo \"$AWS_PASSWORD\" | docker login --username AWS --password-stdin $ECR_REGISTRY
          docker pull $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          if docker ps -a --format '{{.Names}}' | grep -q \"$CONTAINER_NAME\"; then
            echo 'Stopping existing container'
            docker stop $CONTAINER_NAME || true
            docker rm $CONTAINER_NAME || true
          fi
          echo 'Starting new container'
          docker run -d --restart unless-stopped --name $CONTAINER_NAME $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          "

          echo "Running remote deploy commands"
          ssh -o StrictHostKeyChecking=no -i ec2_key.pem $EC2_USER@$EC2_HOST "$REMOTE_CMD"

          echo "Deployment complete"
