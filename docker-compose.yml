version: "3.8"

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: modheshwari-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-modheshwari}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-modheshwari}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-modheshwari}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: modheshwari-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  # Zookeeper (for Kafka) - optional, skip on small VMs
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: modheshwari-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log

  # Kafka - optional, skip on small VMs
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: modheshwari-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka-data:/var/lib/kafka/data

  # Backend API - Elysia + Bun
  be:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: modheshwari-be
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - KAFKA_BROKERS=${KAFKA_BROKERS}
      - NODE_ENV=production
      - PORT=3001
    ports:
      - "3001:3001"
    working_dir: /app
    command: ["bun", "run", "apps/be/src/index.ts"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # Frontend - Next.js
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: modheshwari-web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL}
      - NODE_ENV=production
      - PORT=3000
    ports:
      - "3000:3000"
    working_dir: /app/apps/web
    command: ["bun", "run", "start"]
    depends_on:
      - be

  # WebSocket Server - Bun + ws
  ws:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: modheshwari-ws
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - REDIS_URL=${REDIS_URL}
      - KAFKA_BROKERS=${KAFKA_BROKERS}
      - NODE_ENV=production
      - PORT=3002
    ports:
      - "3002:3002"
    working_dir: /app
    command: ["bun", "run", "apps/ws/index.ts"]
    depends_on:
      - redis
      - kafka

  # Kafka UI - optional monitoring
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: modheshwari-kafka-ui
    restart: unless-stopped
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

volumes:
  postgres-data:
  redis-data:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
