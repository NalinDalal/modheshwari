groups:
  - name: modheshwari-alerts
    rules:
      - alert: BackendDown
        expr: up{job="modheshwari-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Backend down"
          description: "Instance {{ $labels.instance }} for job {{ $labels.job }} is down"

      - alert: HighErrorRate
        expr: increase(errors_total[5m]) > 5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate"
          description: "errors_total increased by more than 5 in the last 5m"

      - alert: HighLatencyP95
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High p95 request latency"
          description: "p95 request latency exceeds 1s"

      - alert: NotificationDLQGrowing
        expr: notification_dlq_size > 100
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Notifications DLQ growing"
          description: "The notifications DLQ size is greater than 100 for more than 5 minutes. Check DLQ retry worker and DB connectivity."

      - alert: NotificationDrainErrors
        expr: increase(errors_total{type=~"notification_drain_.*|notification_dlq_retry"}[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Notification drain or DLQ retry failures detected"
          description: "Errors in notification drain or DLQ retry were reported in the last 5 minutes. Check logs and DB connectivity."
